        body {
                background-size: 100px 100px;
                background-color: #000000;
        }
        .bg-squares {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: -1; 
                overflow: hidden;
                pointer-events: none; 
        }

        .square {
                position: absolute;
                width: 100px;
                height: 100px;
                background-color: rgba(199, 95, 16, 0.1); 
                border: 1px solid rgba(208, 131, 43, 0.311);
                border-radius: 4px;
                transform: rotate(90deg);
                animation: float 25s infinite ease-in-out;
        }

        .square:nth-child(1) { top: 10%; left: 10%; animation-duration: 30s; }
        .square:nth-child(2) { top: 70%; left: 20%; animation-duration: 22s; width: 60px; height: 60px; }
        .square:nth-child(3) { top: 40%; left: 80%; animation-duration: 28s; }
        .square:nth-child(4) { top: 20%; left: 60%; animation-duration: 35s; width: 30px; height: 30px; }
        .square:nth-child(5) { top: 80%; left: 70%; animation-duration: 20s; }
        .square:nth-child(6) { top: 50%; left: 30%; animation-duration: 32s; }

        @keyframes float {
                0%, 100% {
                        transform: translateY(0) translateX(0) rotate(45deg);
                }
                33% {
                        transform: translateY(-20px) translateX(10px) rotate(5deg);
                }
                66% {
                        transform: translateY(10px) translateX(-15px) rotate(-5deg);
                }
        }
        

        html, body {
                margin: 0;
                padding: 0;
                width: 100%;
                overflow-x: hidden;
        }
        .top-bar {
                background-color: rgb(0, 0, 0);

                padding: 20px 0;

        h1 {

        button {

                border-radius: 15px;
                padding: 10px;
                margin: 15px;
                cursor: pointer;
                transition: all 0.3s ease;
                backdrop-filter: blur(5px);
                width: 120px;
                height: 120px;
                display: flex;
                justify-content: center;
                align-items: center;
        }
        button:hover {

                border-color: #ff8400;

        }
        button img {

                height: 100% !important;

        }
        
        p, span, div {
        color: #d5bca1;

        .game-container {

                max-width: 500px;

        h2 {

        .bottom-bar {
